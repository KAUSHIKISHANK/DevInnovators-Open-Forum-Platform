<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Interface</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8f9fa;
            transition: background-color 0.3s, color 0.3s;
        }
        .dark-mode {
            background-color: #222;
            color: white;
        }
        .search-container {
            position: relative;
            width: 400px;
        }
        .search-bar {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            padding-left: 40px;
        }
        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }
        .results {
            margin-top: 20px;
            width: 400px;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }
        .result-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .dark-mode .results {
            background: #333;
            color: white;
        }
        .toggle-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }
    </style>
</head>
<body>
    <div class="toggle-container">
        <label>
            <input type="checkbox" id="darkModeToggle"> Dark Mode
        </label>
    </div>
    <h1 style="color: #4285F4; font-size: 32px;">S<span style="color:#EA4335;">e</span><span style="color:#FBBC05;">a</span><span style="color:#34A853;">r</span><span style="color:#EA4335;">c</span><span style="color:#FBBC05;">h</span></h1>
    <div class="search-container">
        <input type="text" id="search" class="search-bar" placeholder="Search...">
        <span class="search-icon">🔍</span>
    </div>
    <div class="results" id="results"></div><script>
    const items = ["Apple", "Banana", "Cherry", "Date", "Elderberry", "Fig", "Grapes", "Honeydew"];
    const searchInput = document.getElementById("search");
    const resultsContainer = document.getElementById("results");
    const darkModeToggle = document.getElementById("darkModeToggle");
    
    searchInput.addEventListener("input", () => {
        const searchTerm = searchInput.value.toLowerCase();
        resultsContainer.innerHTML = "";
        const filteredItems = items.filter(item => item.toLowerCase().includes(searchTerm));
        filteredItems.forEach(item => {
            const div = document.createElement("div");
            div.classList.add("result-item");
            div.textContent = item;
            resultsContainer.appendChild(div);
        });
    });
    
    darkModeToggle.addEventListener("change", () => {
        document.body.classList.toggle("dark-mode");
    });
</script>

</body>
</html>
